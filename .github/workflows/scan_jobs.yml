name: Escanear Vacantes RD

on:
  schedule:
    - cron: '0 */3 * * *'  # Cada 3 horas, 24/7 (8 ejecuciones al dia)
  workflow_dispatch:        # Permite ejecución manual

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Instalar dependencias
        run: pip install requests
      - name: Escanear vacantes
        run: python job_scanner.py
        env:
          JOB_EMAIL: ${{ secrets.JOB_EMAIL }}
          JOB_EMAIL_PASS: ${{ secrets.JOB_EMAIL_PASS }}
          JOB_NOTIFY_EMAIL: ${{ secrets.JOB_NOTIFY_EMAIL }}
